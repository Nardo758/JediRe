# Broker Commission (Disposition) — Archetype D (portfolio-benchmark-driven)
#
# Real estate broker commission paid on sale of the property.
# Typically 1-3% of sale price for multifamily.
# Negotiable — larger deals get lower rates (scale discount).
#
# Typical bracket:
#   Under $10M: 2-3%
#   $10-50M: 1.5-2.5%
#   $50-100M+: 1-2%
#   $250M+: 0.5-1.5%
#
# Some brokers charge a flat fee + % structure on large deals.
# Acquisition commission is typically paid by seller (not buyer).

liuid: "exit.brokerCommission"
label: "Broker Commission (Disposition)"
section: "exit"
archetype: "D"
version: 1

applicableDealTypes:
  - acquisition
  - development
  - refi
  - reforecast
  - disposition

sourcePreference: [4, 3, 5]
# Tier 4: broker OM (stated commission structure — most authoritative)
# Tier 3: archive broker commissions by deal size and asset class
# Tier 5: 2% of exit price

lifecycleOverrides: []

dependsOn:
  required: []

hardRules: []

trajectory:
  baseGrowth: "cpi"
  scheduledEvents: []
  profileDerivedEvents: false

collision:
  enabled: true
  brokerMapping: "exit.broker_commission"
  materiality:
    absoluteMin: 50000
    pctMin: 0.20

confidence:
  minSampleForHigh: 30
  freshnessDays: 365

reasoningTemplate: |
  Broker commission: {{commission_pct}}% of exit price (${{value}}).
  Exit price: ${{exit_price}}.
  Deal size bracket: {{deal_size_bracket}}.
  {{commission_structure_note}}.
  Archive (n={{archive_n}}): {{archive_commission_pct}}% for {{deal_size_bracket}}.
  {{collision_note}}

notes: |
  Broker commissions are a point of leverage in strong markets.
  A 0.5% reduction on a $100M deal saves $500K in exit costs.
  Dual representation (buyer/seller same broker) may reduce rate.
