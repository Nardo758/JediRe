# Exit Cap Rate — Archetype F (market-index driven)
#
# The capitalization rate at disposition. Primary driver of exit value
# and the single most impactful assumption in the proforma.
#
# Exit cap ≠ going-in cap. Exit cap reflects:
#   - Market conditions at disposition (typically 5-10 year forward)
#   - Property condition at exit (stabilized vs transitional)
#   - Interest rate environment
#   - Asset class sentiment
#
# D2 (CE-M26) re-scope:
#   The pre-D2 Tier 3 source — "M26 archive submarket cap rate
#   trajectory" — did not exist as a table, service, or writer (audit
#   §1.5 / CE-M26). The data this resolver needs is the same data the
#   historical_observations corpus is being built to hold:
#   realized_cap_rate_change_t12_bps and realized_cap_rate_change_t24_bps,
#   populated by CoStar submarket ingestion in corpus Phase 4 (per
#   HISTORICAL_OBSERVATIONS_SPEC.md §10). Tier 3 below now queries
#   historical_observations directly. When the corpus has no cap rate
#   data for the deal's submarket the resolver falls through to Tier 5,
#   which emits structured telemetry so it is OBVIOUS the exit cap is
#   running on the going-in + 25bps fallback rather than silently
#   doing so.
#
# Default: going-in cap + 25bps expansion (loud, telemetry-flagged)
#   (e.g., 5.50% going-in → 5.75% exit)

liuid: "exit.exitCapRate"
label: "Exit Cap Rate"
section: "exit"
archetype: "F"
version: 2

applicableDealTypes:
  - acquisition
  - development
  - refi
  - reforecast
  - disposition

sourcePreference: [3, 2.5, 4, 5]
# Tier 3: historical_observations.realized_cap_rate_change_t* (corpus
#         Phase 4 — sparse until CoStar submarket ingestion populates)
# Tier 2.5: profile cluster exit cap achieved by product type
# Tier 4: broker OM (going-in cap only — exit cap framed separately)
# Tier 5: going-in cap + 25bps — LOUD fallback, telemetry-flagged

lifecycleOverrides: []

dependsOn:
  required: []

hardRules:
  - condition: "development"
    description: "Development exit cap = stabilized cap + risk premium"
    effect:
      sourceActions: []
      trajectoryOverrides: []

trajectory:
  baseGrowth: "exit_cap_trajectory"
  scheduledEvents:
    - primitive: "rate_delta"
      year: 1
      description: "Year 1: base exit cap rate"
      deltaPct: 0.0
      source: "schema"
      confidence: 0.6
      binding: false
    - primitive: "rate_delta"
      year: 3
      description: "Year 3-5: cap rate adjustment based on interest rate trajectory"
      deltaPct: 1.0
      source: "schema"
      confidence: 0.4
      binding: false
  profileDerivedEvents: false

collision:
  enabled: true
  brokerMapping: "exit.cap_rate"
  materiality:
    absoluteMin: 0.30
    pctMin: 0.05
    # 30 bps absolute or 5% relative delta triggers collision

confidence:
  minSampleForHigh: 50
  freshnessDays: 180

reasoningTemplate: |
  Exit cap rate: {{exit_cap}}%.
  Going-in cap: {{going_in_cap}}%.
  Basis point expansion: {{bps_expansion}}bps.
  Hold period: {{hold_years}} years.
  Submarket: {{submarket}} {{property_type}} {{vintage}}.
  Historical realized cap-rate changes (corpus):
    T12 median: {{cap_change_t12_bps_median}} bps (n={{cap_change_n}})
    T24 median: {{cap_change_t24_bps_median}} bps
  Interest rate 10yr treasury: {{treasury_10yr}} ({{treasury_trend}}).
  {{cap_spread_trend}} bps spread to treasuries ({{spread_assessment}}).
  Profile cluster exit caps (n={{profile_n}}): {{profile_exit_caps}}.
  {{collision_note}}

notes: |
  Exit cap rate is the single most important assumption in the proforma.
  A 25bps error at a 5.5% exit cap is ~4.5% of value (~$2.7M on a $60M deal).
  Never use going-in cap as exit cap — always add basis points for
  uncertainty (25bps minimum, 50bps for development/lease-up).
  Tier 3 reads historical_observations cap-rate realizations for the
  deal's submarket; sparse until corpus Phase 4 populates. When the
  cascade falls through to Tier 5 (going-in + 25bps) the resolver
  emits a loud telemetry event — that is the signal the platform is
  running on its crudest fallback rather than empirical data.
