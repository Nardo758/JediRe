# Cloudflare Worker Configuration
# Deploy: wrangler deploy

name = "municode-scraper"
main = "municode-scraper.js"
compatibility_date = "2024-01-01"

# Workers Paid plan required for longer CPU time
# Free plan: 10ms CPU time
# Paid plan: 50ms CPU time (needed for scraping)

[env.production]
workers_dev = false
route = "https://municode-scraper.your-domain.workers.dev/*"

# Environment variables (set via wrangler secret)
# None needed for this worker
