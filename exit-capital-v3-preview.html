  4.8,4.9,5.0,4.6, 4.2,4.0,3.8,3.5, 3.2,3.0,2.8,2.5, 2.2,2.4,2.6,2.8,

  1.2,-2.5,-1.0,0.5, 2.0,6.5,11.0,14.2, 12.0,8.5,5.0,3.0, 2.0,1.5,1.8,2.2,
  // 2024-2025: recovery
  2.5,2.8,3.0,3.1, 3.2,3.3,3.4,3.5,

  3.6,3.7,3.8,3.7, 3.5,3.4,3.2,3.0, 2.8,2.7,2.5,2.4, 2.3,2.4,2.5,2.6,
  2.7,2.8,2.8,2.9, 3.0,3.0,2.9,2.8, 2.7,2.6,2.5,2.4, 2.4,2.5,2.6,2.7,

  5.2,5.8,6.0,5.8, 5.5,5.0,4.5,4.2, 4.0,4.1,4.5,4.8, 5.0,5.2,5.3,5.4,
  5.4,5.3,5.2,5.1, 5.1,5.0,5.0,5.0,
  // NOW →
  5.0,4.9,4.9,4.8, 4.8,4.8,4.9,5.0, 5.0,5.1,5.1,5.2, 5.2,5.2,5.1,5.1,
  5.0,5.0,5.0,5.0, 5.1,5.1,5.2,5.2, 5.2,5.1,5.1,5.0, 5.0,5.0,5.0,5.1,

const T10_21Y=[

  3.2,3.2,3.1,3.1, 3.0,3.0,3.0,2.9, 2.9,2.9,2.8,2.8

// RSS sub-computation
function computeRSS21(i){
  const rg=RENT_GROWTH_21Y[i]||2.5, cap=CAP_RATES_21Y[i]||5.0, supply=SUPPLY_21Y[i]||0;
  const rate=T10_21Y[i]||3.5;
  const txn=Math.max(20,60+Math.sin(i*0.15)*20);
  const bp=Math.max(30,55+Math.sin(i*0.12)*18);
  const mw=Math.min(100,Math.max(0,(rg/6*40)+((1-cap/7)*100*0.30)+(txn*0.20)+5));
  const re=Math.min(100,Math.max(0,((5.0-rate)/2.5*100*0.40)+((cap-rate)*100*0.35/3)+((4.5-rate)/2.5*100*0.25)));
  const sp=Math.max(0,100-supply/8);
  const opR=Math.min(100,30+Math.max(0,i-NOW_IDX)*3.5);
  const rss=Math.round(Math.max(0,Math.min(100,mw*0.35+re*0.25+sp*0.20+opR*0.15+bp*0.05)));
  return{rss,mw:Math.round(mw),re:Math.round(Math.max(0,re)),sp:Math.round(sp),or:Math.round(opR),bp:Math.round(bp)};
}
const RSS_21Y=Array.from({length:TOTAL_Q},(_,i)=>computeRSS21(i));

// Quarter labels
const Q_LABELS=Array.from({length:TOTAL_Q},(_,i)=>{const y=2016+Math.floor(i/4);const q=(i%4)+1;return{idx:i,label:`Q${q}'${String(y).slice(2)}`,yearLabel:q===1?String(y):null,year:y,isProj:i>=NOW_IDX}});

// Forward-only quarters for exit selection (index relative to NOW)
const FWD_COUNT=TOTAL_Q-NOW_IDX;
function fwdLabel(fi){return Q_LABELS[NOW_IDX+fi]?.label||"";}

// Recession bands
const RECESSIONS=[{label:"COVID",s:16,e:19}];
const FED_EVENTS=[{q:4,l:"First hike",c:K.r},{q:16,l:"Emergency cut",c:K.g},{q:24,l:"Hiking begins",c:K.r},{q:36,l:"First cut",c:K.g}];

// Exit returns at a forward quarter index (0 = Q1'26, 1 = Q2'26, etc.)
function computeExitReturns(fwdIdx,dealType="existing"){
  const absIdx=NOW_IDX+fwdIdx;
  const holdYears=Math.max(0.25,(fwdIdx+1)/4);
  const baseNOI=dealType==="development"?2800000:3420000;
  const totalBasis=dealType==="development"?52000000:46420000;
  const equity=dealType==="development"?18200000:14920000;
  const annualDS=2340000;
  let noiMult=1;
  for(let i=NOW_IDX;i<=absIdx&&i<TOTAL_Q;i++)noiMult*=(1+((RENT_GROWTH_21Y[i]||2.5)/100)/4);
  const exitNOI=baseNOI*noiMult;
  const exitCap=(CAP_RATES_21Y[absIdx]||5.0)/100;
  const grossValue=exitNOI/exitCap;const sellingCosts=grossValue*0.02;const loanPayoff=totalBasis-equity;
  const netProceeds=grossValue-sellingCosts-loanPayoff;
  const yrs=Math.ceil(holdYears);
  let totalCF=0;for(let y=0;y<yrs;y++){let ym=1;for(let q=0;q<4&&(y*4+q)<fwdIdx;q++)ym*=(1+(RENT_GROWTH_21Y[NOW_IDX+y*4+q]||2.5)/100/4);totalCF+=baseNOI*ym-annualDS;}
  const totalReturn=totalCF+netProceeds;const em=equity>0?totalReturn/equity:0;
  const irr=holdYears>0&&equity>0?(Math.pow(Math.max(0.01,totalReturn/equity),1/holdYears)-1)*100:0;
  const rss=RSS_21Y[absIdx]?.rss||50;
  return{holdYears:holdYears.toFixed(1),exitNOI,grossValue,netProceeds,totalReturn,irr:Math.max(0,Math.min(50,irr)),em:Math.max(0,em),exitCap:CAP_RATES_21Y[absIdx]||5.0,rss,absIdx};
}

// ═══════════════════════════════════════════════════════════
// 21-YEAR CONVERGENCE CHART
// ═══════════════════════════════════════════════════════════

function ConvergenceChart21({selectedFwd,onSelectFwd,optimalFwd}){
  const svgRef=useRef(null);
  const W=920,H=360,pad={t:30,r:50,b:58,l:50};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const x=i=>pad.l+(i/(TOTAL_Q-1))*iW;
  const nowX=x(NOW_IDX);

  // Y scales
  const rgMin=-3,rgMax=15;
  const capMin=3.5,capMax=6.5;
  const rssMin=0,rssMax=100;
  const yRG=v=>pad.t+iH-((v-rgMin)/(rgMax-rgMin))*iH;
  const yCap=v=>pad.t+iH-((v-capMin)/(capMax-capMin))*iH;
  const yRSS=v=>pad.t+iH-((v-rssMin)/(rssMax-rssMin))*iH;

  const maxSupply=Math.max(...SUPPLY_21Y);
  const selAbsIdx=NOW_IDX+selectedFwd;
  const optAbsIdx=NOW_IDX+optimalFwd;

  const handleClick=useCallback((e)=>{
    const svg=svgRef.current;if(!svg)return;
    const rect=svg.getBoundingClientRect();const mx=(e.clientX-rect.left)/rect.width*W;
    const absIdx=Math.round(((mx-pad.l)/iW)*(TOTAL_Q-1));
    if(absIdx>=NOW_IDX&&absIdx<TOTAL_Q){onSelectFwd(absIdx-NOW_IDX)}
  },[onSelectFwd]);

  // Build paths
  const rgHistPath=[], rgProjPath=[], capHistPath=[], capProjPath=[], rssHistPath=[], rssProjPath=[];
  for(let i=0;i<TOTAL_Q;i++){
    const px=x(i);
    const rg=RENT_GROWTH_21Y[i]||2.5, cap=CAP_RATES_21Y[i]||5.0, rss=RSS_21Y[i]?.rss||50;
    const pt1=`${px},${yRG(rg)}`, pt2=`${px},${yCap(cap)}`, pt3=`${px},${yRSS(rss)}`;
    if(i<=NOW_IDX){rgHistPath.push(pt1);capHistPath.push(pt2);rssHistPath.push(pt3);}
    if(i>=NOW_IDX){rgProjPath.push(pt1);capProjPath.push(pt2);rssProjPath.push(pt3);}
  }

  // Sell window zone (forward only, RSS >= 70)
  let wS=null,wE=null;
  for(let i=NOW_IDX;i<TOTAL_Q;i++){if(RSS_21Y[i]?.rss>=70){if(wS===null)wS=i;wE=i;}}

  const[hoverIdx,setHoverIdx]=useState(null);
  const handleMove=useCallback(e=>{
    const svg=svgRef.current;if(!svg)return;
    const rect=svg.getBoundingClientRect();const mx=(e.clientX-rect.left)/rect.width*W;
    const idx=Math.round(((mx-pad.l)/iW)*(TOTAL_Q-1));
    if(idx>=0&&idx<TOTAL_Q)setHoverIdx(idx);
  },[]);

  return(
    <div style={{position:"relative"}}>
    <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} onClick={handleClick} onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}
      style={{cursor:"crosshair",display:"block"}}>

      {/* Historical background */}
      <rect x={pad.l} y={pad.t} width={nowX-pad.l} height={iH} fill="rgba(255,255,255,0.008)"/>
      {/* Projected background */}
      <rect x={nowX} y={pad.t} width={W-pad.r-nowX} height={iH} fill="rgba(99,179,237,0.015)"/>

      {/* Recessions */}
      {RECESSIONS.map((r,i)=><g key={i}><rect x={x(r.s)} y={pad.t} width={x(r.e)-x(r.s)} height={iH} fill="rgba(252,129,129,0.04)"/><text x={(x(r.s)+x(r.e))/2} y={pad.t+12} textAnchor="middle" fill={K.r} fontSize={7} fontFamily={K.m} opacity={0.4}>{r.label}</text></g>)}

      {/* Sell window in forward zone */}
      {wS!==null&&<rect x={x(wS)} y={pad.t-4} width={x(wE)-x(wS)} height={iH+8} fill="rgba(104,211,145,0.05)" stroke={K.g} strokeWidth={0.5} strokeDasharray="6,4" rx={4}/>}

      {/* Supply bars */}
      {SUPPLY_21Y.map((v,i)=>{if(v===0||maxSupply===0)return null;const h=(v/maxSupply)*iH*0.35;
        return<rect key={i} x={x(i)-2} y={pad.t+iH-h} width={4} height={h} fill={i>=NOW_IDX?"rgba(246,173,85,0.2)":"rgba(246,173,85,0.08)"} rx={1}/>})}

      {/* Rent growth — solid historical, dashed projected */}
      <path d={`M${rgHistPath.join(" L")}`} fill="none" stroke={K.g} strokeWidth={1.5}/>
      <path d={`M${rgProjPath.join(" L")}`} fill="none" stroke={K.g} strokeWidth={1.5} strokeDasharray="5,3" opacity={0.7}/>

      {/* Cap rate */}
      <path d={`M${capHistPath.join(" L")}`} fill="none" stroke={K.a} strokeWidth={1.5}/>
      <path d={`M${capProjPath.join(" L")}`} fill="none" stroke={K.a} strokeWidth={1.5} strokeDasharray="5,3" opacity={0.7}/>

      {/* RSS — bold, forward only meaningful */}
      <path d={`M${rssHistPath.join(" L")}`} fill="none" stroke="#10b981" strokeWidth={1} opacity={0.3}/>
      <path d={`M${rssProjPath.join(" L")}`} fill="none" stroke="#10b981" strokeWidth={2.5}/>

      {/* NOW divider */}
      <line x1={nowX} y1={pad.t-8} x2={nowX} y2={pad.t+iH+8} stroke={K.t} strokeWidth={1.5}/>
      <rect x={nowX-16} y={pad.t-18} width={32} height={14} rx={3} fill={K.t}/>
      <text x={nowX} y={pad.t-8} textAnchor="middle" fill={K.bg} fontSize={8} fontFamily={K.m} fontWeight={700}>NOW</text>

      {/* Fed events */}
      {FED_EVENTS.map((e,i)=><g key={i}><line x1={x(e.q)} y1={pad.t} x2={x(e.q)} y2={pad.t+iH} stroke={e.c} strokeWidth={0.5} strokeDasharray="3,4" opacity={0.25}/><text x={x(e.q)} y={pad.t-4} textAnchor="middle" fill={e.c} fontSize={6} fontFamily={K.m} opacity={0.5}>{e.l}</text></g>)}

      {/* Optimal marker */}
      <line x1={x(optAbsIdx)} y1={pad.t} x2={x(optAbsIdx)} y2={pad.t+iH} stroke={K.g} strokeWidth={1} strokeDasharray="4,3" opacity={0.5}/>
      <text x={x(optAbsIdx)} y={pad.t+iH+28} textAnchor="middle" fill={K.g} fontSize={8} fontFamily={K.m} fontWeight={700}>OPTIMAL</text>

      {/* User selected marker */}
      <line x1={x(selAbsIdx)} y1={pad.t-2} x2={x(selAbsIdx)} y2={pad.t+iH+2} stroke={K.t} strokeWidth={2}/>
      <rect x={x(selAbsIdx)-22} y={pad.t-20} width={44} height={14} rx={3} fill={K.t}/>
      <text x={x(selAbsIdx)} y={pad.t-10} textAnchor="middle" fill={K.bg} fontSize={8} fontFamily={K.m} fontWeight={700}>{Q_LABELS[selAbsIdx]?.label}</text>
      <text x={x(selAbsIdx)} y={yRSS(RSS_21Y[selAbsIdx]?.rss||50)-10} textAnchor="middle" fill="#10b981" fontSize={11} fontFamily={K.m} fontWeight={800}>{RSS_21Y[selAbsIdx]?.rss||50}</text>

      {/* Year labels */}
      {Q_LABELS.filter(q=>q.yearLabel).map(q=><text key={q.idx} x={x(q.idx)} y={pad.t+iH+14} textAnchor="middle" fill={q.isProj?`${K.a}60`:K.td} fontSize={8} fontFamily={K.m} fontWeight={q.year===2026?700:400}>{q.yearLabel}</text>)}

      {/* Y-axis labels */}
      <text x={pad.l-6} y={pad.t+4} textAnchor="end" fill={K.g} fontSize={7} fontFamily={K.m}>{rgMax}%</text>
      <text x={pad.l-6} y={pad.t+iH} textAnchor="end" fill={K.g} fontSize={7} fontFamily={K.m}>{rgMin}%</text>
      <text x={W-pad.r+6} y={pad.t+4} textAnchor="start" fill="#10b981" fontSize={7} fontFamily={K.m}>100</text>
      <text x={W-pad.r+6} y={pad.t+iH} textAnchor="start" fill="#10b981" fontSize={7} fontFamily={K.m}>0</text>

      {/* Labels */}
      <text x={(pad.l+nowX)/2} y={pad.t+iH+40} textAnchor="middle" fill={K.td} fontSize={7} fontFamily={K.m} letterSpacing={2}>HISTORICAL (10yr)</text>
      <text x={(nowX+W-pad.r)/2} y={pad.t+iH+40} textAnchor="middle" fill={`${K.a}60`} fontSize={7} fontFamily={K.m} letterSpacing={2}>PROJECTED (10yr) — click to set exit</text>

      {/* Hover crosshair */}
      {hoverIdx!==null&&<line x1={x(hoverIdx)} y1={pad.t} x2={x(hoverIdx)} y2={pad.t+iH} stroke="rgba(255,255,255,0.12)" strokeWidth={0.5}/>}

      {/* Legend */}
      <g transform={`translate(${pad.l},${H-10})`}>
        <line x1={0} y1={0} x2={12} y2={0} stroke={K.g} strokeWidth={1.5}/><text x={16} y={3} fill={K.td} fontSize={7}>Rent growth %</text>
        <line x1={100} y1={0} x2={112} y2={0} stroke={K.a} strokeWidth={1.5}/><text x={116} y={3} fill={K.td} fontSize={7}>Cap rate %</text>
        <rect x={190} y={-3} width={6} height={6} fill="rgba(246,173,85,0.2)" rx={1}/><text x={200} y={3} fill={K.td} fontSize={7}>Supply</text>
        <line x1={248} y1={0} x2={260} y2={0} stroke="#10b981" strokeWidth={2.5}/><text x={264} y={3} fill={K.td} fontSize={7}>RSS score</text>
        <rect x={328} y={-3} width={10} height={6} fill="rgba(104,211,145,0.05)" stroke={K.g} strokeWidth={0.5} strokeDasharray="2,1" rx={1}/><text x={342} y={3} fill={K.td} fontSize={7}>Sell window</text>
      </g>
    </svg>

    {/* Hover tooltip */}
    {hoverIdx!==null&&<div style={{position:"absolute",top:8,right:8,background:"rgba(11,14,19,0.94)",border:`1px solid ${K.b}`,borderRadius:6,padding:"8px 12px",pointerEvents:"none",minWidth:170}}>
      <div style={{fontSize:10,fontWeight:700,fontFamily:K.m,color:Q_LABELS[hoverIdx]?.isProj?K.a:K.t,marginBottom:4}}>{Q_LABELS[hoverIdx]?.label} {Q_LABELS[hoverIdx]?.isProj?"(projected)":""}</div>
      {[{l:"Rent growth",v:RENT_GROWTH_21Y[hoverIdx],c:K.g,s:"%"},{l:"Cap rate",v:CAP_RATES_21Y[hoverIdx],c:K.a,s:"%"},{l:"Treasury 10Y",v:T10_21Y[hoverIdx],c:K.p,s:"%"},{l:"Supply",v:SUPPLY_21Y[hoverIdx],c:K.o,s:" units"},{l:"RSS",v:RSS_21Y[hoverIdx]?.rss,c:"#10b981",s:""}].map(r=><div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"1px 0"}}><span style={{fontSize:8,color:r.c}}>{r.l}</span><span style={{fontSize:9,fontFamily:K.m,fontWeight:600,color:r.c}}>{r.v!=null?r.v.toFixed?r.v.toFixed(1)+r.s:r.v+r.s:"—"}</span></div>)}
    </div>}
    </div>
  );
}

function generateRateHistory(){

              <div style={{fontSize:10,color:K.tm,marginBottom:10}}>{opt.desc}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {[{l:"IRR",v:`${ret.irr.toFixed(1)}%`,c:ret.irr>=15?K.g:K.y},{l:"EM",v:`${ret.em.toFixed(2)}x`,c:K.a},{l:"Exit Cap",v:fpct(ret.exitCap),c:K.tm},{l:"Timeline",v:opt.tl,c:K.p}].map(m=><div key={m.l}><div style={{fontSize:8,color:K.td,fontFamily:K.m}}>{m.l}</div><div style={{fontSize:13,fontWeight:700,fontFamily:K.m,color:m.c}}>{m.v}</div></div>)}
              </div>
            </div>})}
          </div>
        </div>}

        {/* CAPITAL STACK */}
        {activeTab==="stack"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m,marginBottom:10}}>CAPITAL STACK — {stack.label.toUpperCase()}</div>
            {[{l:`Senior — ${stack.sr.type}`,pct:stack.sr.pct,rate:stack.sr.rate,c:K.a},...(stack.mz?[{l:`Mezz — ${stack.mz.type}`,pct:stack.mz.pct,rate:stack.mz.rate,c:K.y}]:[]),{l:"Sponsor Equity",pct:stack.eq,rate:null,c:K.p}].map((ly,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:`${ly.c}10`,borderRadius:6,border:`1px solid ${ly.c}25`,minHeight:Math.max(36,ly.pct*0.8),marginBottom:2}}>
              <div><div style={{fontSize:11,fontWeight:600,color:ly.c}}>{ly.l}</div><div style={{fontSize:9,color:K.tm}}>{ly.pct}%</div></div>
              <div style={{textAlign:"right"}}>{ly.rate&&<div style={{fontSize:13,fontWeight:700,fontFamily:K.m,color:ly.c}}>{fpct(ly.rate)}</div>}</div>
            </div>)}
          </div>
          <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m,marginBottom:10}}>DEBT PRODUCTS</div>
            {DEBT_PRODUCTS.map(p=><div key={p.name} style={{display:"grid",gridTemplateColumns:"1fr 86px 48px 56px 48px",gap:4,alignItems:"center",padding:"7px 10px",borderRadius:5,border:`1px solid ${K.b}`,marginBottom:2}}>
              <div><div style={{fontSize:10,fontWeight:600,color:p.color}}>{p.name}</div><div style={{fontSize:8,color:K.td}}>{p.best}</div></div>
              <span style={{fontSize:9,fontFamily:K.m,color:K.t}}>{p.rate}</span><span style={{fontSize:9,fontFamily:K.m,color:K.tm}}>{p.ltv}</span><span style={{fontSize:9,fontFamily:K.m,color:K.td}}>{p.term}</span><span style={{fontSize:9,fontFamily:K.m,color:K.td}}>{p.dscr}</span>
            </div>)}
          </div>
        </div>}

        {/* DEBT MARKET */}
        {activeTab==="market"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
            {[{l:"SOFR",v:"4.10%",d:"-18bps (90d)",c:K.a,dir:"↓"},{l:"10Y TREASURY",v:"3.80%",d:"-30bps (90d)",c:K.p,dir:"↓"},{l:"AGENCY",v:"+165bps",d:"Tightening",c:K.g,dir:"↓"},{l:"CMBS",v:"+215bps",d:"Stable",c:K.o,dir:"—"},{l:"BRIDGE",v:"+340bps",d:"Compressing",c:K.c,dir:"↓"}].map(r=><div key={r.l} style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:7,padding:"10px 12px"}}>
              <div style={{fontSize:8,color:K.td,fontFamily:K.m,letterSpacing:0.6,marginBottom:4}}>{r.l}</div>
              <div style={{fontSize:18,fontWeight:800,fontFamily:K.m,color:r.c}}>{r.v}</div>
              <div style={{fontSize:9,color:r.dir==="↓"?K.g:r.dir==="↑"?K.r:K.tm,marginTop:2}}>{r.dir} {r.d}</div>
            </div>)}
          </div>
          <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div><span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m}}>21-YEAR RATE HISTORY & FORECAST (2016–2036)</span><div style={{fontSize:9,color:K.tm,marginTop:2}}>Solid = historical · Dashed = projected · Blue band = SOFR confidence</div></div>
              <div style={{display:"flex",gap:4}}>{[null,"sofr","t10","agency","cmbs","bridge"].map(s=><button key={s||"all"} onClick={()=>setRateHL(s)} style={{padding:"2px 8px",borderRadius:4,fontSize:8,fontWeight:600,cursor:"pointer",border:`1px solid ${K.b}`,fontFamily:K.m,background:rateHL===s?"rgba(255,255,255,0.06)":"transparent",color:rateHL===s?K.t:K.td}}>{s?s.toUpperCase():"ALL"}</button>)}</div>
            </div>
            <RateChart21Y data={RATE_DATA} hl={rateHL}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px"}}><span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m}}>SPREAD OVER INDEX (bps)</span><div style={{marginTop:12}}><SpreadChart/></div></div>
            <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px"}}>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m}}>LENDER QUOTES</span>
              <div style={{marginTop:10}}>{LENDER_QUOTES.map(q=><div key={q.lender} style={{display:"grid",gridTemplateColumns:"1fr 60px 48px 48px 44px 40px",gap:4,alignItems:"center",padding:"6px 10px",borderRadius:5,border:`1px solid ${K.b}`,marginBottom:2}}>
                <div><div style={{fontSize:10,fontWeight:600,color:K.t}}>{q.lender}</div><div style={{fontSize:8,color:K.td}}>{q.product}</div></div>
                <span style={{fontSize:10,fontFamily:K.m,fontWeight:700,color:K.g}}>{q.rate}</span><span style={{fontSize:8,fontFamily:K.m,color:K.a}}>{q.spread}</span><span style={{fontSize:8,fontFamily:K.m,color:K.tm}}>{q.ltv}</span><span style={{fontSize:8,fontFamily:K.m,color:K.td}}>{q.term}</span><span style={{fontSize:7,color:K.td}}>{q.rcvd}</span>
              </div>)}</div>
            </div>
          </div>
        </div>}

        {/* EXIT TIMING */}
        {activeTab==="timing"&&<div>
          <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px",marginBottom:16}}>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m}}>IRR BY EXIT QUARTER — click to select (pushes hold period to ProForma)</span>
            <div style={{display:"flex",alignItems:"flex-end",gap:1,height:140,marginTop:12}}>
              {Array.from({length:FWD_COUNT},(_,i)=>{const r=computeExitReturns(i,dealType);const h=Math.max(4,(r.irr/30)*130);const isS=i===selectedFwd;const isO=i===optimalFwd;const col=isS?K.t:isO?K.g:r.irr>=15?K.g:r.irr>=10?K.a:K.r;
                return<div key={i} onClick={()=>setSelectedFwd(i)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:"pointer"}}>
                  {(isS||isO||i%2===0)&&<span style={{fontSize:7,fontFamily:K.m,fontWeight:isS?700:400,color:isS?K.t:K.td}}>{r.irr.toFixed(0)}</span>}
                  <div style={{width:"100%",height:h,borderRadius:2,background:isS?K.t:`${col}30`,border:isO?`1px solid ${K.g}`:isS?`1px solid ${K.t}`:"none"}}/>
                </div>})}
            </div>
            <div style={{display:"flex",gap:1,marginTop:2}}>{Array.from({length:FWD_COUNT},(_,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:6,fontFamily:K.m,color:i===selectedFwd?K.t:i%4===0?K.td:"transparent"}}>{fwdLabel(i)}</div>)}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {[[selectedFwd,ret,"YOUR SELECTION",`${K.t}30`,K.t],[optimalFwd,optRet,"PLATFORM OPTIMAL",`${K.g}20`,K.g]].map(([fi,r,title,bc,tc],idx)=><div key={idx} style={{background:K.s,border:`1px solid ${bc}`,borderRadius:8,padding:"16px 20px"}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:tc,fontFamily:K.m,marginBottom:10}}>{title} — {fwdLabel(fi)}</div>
              {[{l:"Hold",v:`${r.holdYears}yr`},{l:"Exit NOI",v:fk(r.exitNOI),c:K.g},{l:"Cap",v:fpct(r.exitCap),c:K.a},{l:"Gross value",v:fk(r.grossValue),c:K.g},{l:"Net proceeds",v:fk(r.netProceeds),c:K.g},{sep:1},{l:"IRR",v:fpct(r.irr),c:r.irr>=15?K.g:K.y,big:1},{l:"EM",v:`${r.em.toFixed(2)}x`,c:K.a,big:1},{l:"RSS",v:r.rss,c:r.rss>=70?K.g:K.y,big:1}].map((row,i)=>{
                if(row.sep)return<div key={i} style={{height:1,background:K.bh,margin:"6px 0"}}/>;
                return<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}><span style={{fontSize:10,color:K.tm}}>{row.l}</span><span style={{fontSize:row.big?14:11,fontWeight:row.big?800:600,fontFamily:K.m,color:row.c||K.t}}>{row.v}</span></div>})}
            </div>)}
          </div>
        </div>}

        {/* SENSITIVITY */}
        {activeTab==="sensitivity"&&<div>
          <div style={{background:K.s,border:`1px solid ${K.b}`,borderRadius:8,padding:"16px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:K.td,fontFamily:K.m}}>IRR SENSITIVITY — EXIT CAP × RENT GROWTH</span>
              <span style={{fontSize:8,color:K.tm,fontFamily:K.m}}>Shared ProForma engine — not duplicated</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"80px repeat(7,1fr)",gap:2}}>
              <div style={{padding:"4px 8px",fontSize:8,color:K.td,fontFamily:K.m}}>CAP \ RENT</div>
              {[1.0,1.5,2.0,2.5,3.0,3.5,4.0].map(rg=><div key={rg} style={{padding:"4px 6px",textAlign:"center",fontSize:8.5,fontFamily:K.m,color:K.tm,background:"rgba(255,255,255,0.02)",borderRadius:3}}>{rg}%</div>)}
              {[4.75,5.00,5.25,5.50,5.75,6.00,6.25].map(cap=><React.Fragment key={cap}>
                <div style={{padding:"4px 8px",fontSize:8.5,fontFamily:K.m,color:K.tm,display:"flex",alignItems:"center"}}>{cap}%</div>
                {[1.0,1.5,2.0,2.5,3.0,3.5,4.0].map(rg=>{const adj=ret.irr+(3.0-rg)*-1.5+(5.25-cap)*3;const irr=Math.max(0,Math.min(40,adj));const isBase=Math.abs(cap-ret.exitCap)<0.1&&Math.abs(rg-3.0)<0.1;const bg=irr>=20?"rgba(104,211,145,0.2)":irr>=15?"rgba(104,211,145,0.1)":irr>=10?"rgba(246,224,94,0.1)":"rgba(252,129,129,0.1)";const col=irr>=20?K.g:irr>=15?K.g:irr>=10?K.y:K.r;
                  return<div key={`${cap}-${rg}`} style={{padding:"6px 4px",textAlign:"center",borderRadius:3,background:bg,border:isBase?`2px solid ${K.t}`:"1px solid transparent"}}><span style={{fontSize:10,fontFamily:K.m,fontWeight:isBase?800:500,color:col}}>{irr.toFixed(1)}%</span></div>})}
              </React.Fragment>)}
            </div>
          </div>
        </div>}
      </div>
    </div>
  );
}

function App(){
  const[dt,setDt]=useState("existing");
  return<div>
    <div style={{padding:"8px 24px",background:"#050810",display:"flex",gap:6,alignItems:"center"}}>
      <span style={{fontSize:9,color:"rgba(232,230,225,0.3)",fontFamily:K.m,marginRight:8}}>DEAL TYPE:</span>
      {["existing","development","redevelopment"].map(d=><button key={d} onClick={()=>setDt(d)} style={{padding:"4px 12px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",border:`1px solid ${dt===d?"#63B3ED40":"rgba(255,255,255,0.06)"}`,background:dt===d?"rgba(99,179,237,0.08)":"transparent",color:dt===d?"#63B3ED":"rgba(232,230,225,0.5)",fontFamily:K.f,textTransform:"capitalize"}}>{d}</button>)}
    </div>
    <ExitCapitalModule dealType={dt}/>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
